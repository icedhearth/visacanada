<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMM 5257 Completo | Objetivo Turismo</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f4f7f6; margin: 0; padding: 10px; color: #2c3e50; }
        .container { max-width: 900px; margin: 10px auto; background: #fff; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #c0392b; border-bottom: 2px solid #c0392b; padding-bottom: 10px; text-align: center; }
        h2 { background: #ecf0f1; padding: 10px; border-radius: 4px; color: #2980b9; font-size: 1.2rem; margin-top: 30px; }
        .form-section { display: none; }
        .form-section.active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .progress-bar { width: 100%; height: 8px; background: #ddd; border-radius: 4px; margin: 20px 0; }
        .progress-bar-fill { height: 100%; width: 0%; background: #c0392b; transition: width 0.3s; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.95rem; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #bdc3c7; border-radius: 4px; box-sizing: border-box; }
        .radio-group { display: flex; gap: 20px; padding: 10px 0; }
        .radio-group label { font-weight: normal; cursor: pointer; }
        .hidden-field { display: none; background: #f9f9f9; padding: 15px; border-left: 4px solid #3498db; margin-top: 10px; }
        .nav-btns { display: flex; justify-content: space-between; margin-top: 40px; }
        button { padding: 12px 30px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        #nextBtn, #submitBtn { background: #c0392b; color: white; }
        #prevBtn { background: #95a5a6; color: white; }
        .info-note { font-size: 0.85rem; color: #7f8c8d; margin-top: 5px; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h1>Solicitação de Visto (IMM 5257)</h1>
    <div class="progress-bar"><div class="progress-bar-fill" id="progressBar"></div></div>

    <form id="imm5257Form">
        <div class="form-section active">
            <h2>1. Informações Pessoais</h2>
            <div class="form-group"><label>UCI (Se possuir)</label><input type="text" name="uci" placeholder="0000-0000"></div>
            <div class="form-group"><label>Sobrenome(s) (Como no Passaporte)</label><input type="text" name="lastName" required></div>
            <div class="form-group"><label>Nome(s) (Como no Passaporte)</label><input type="text" name="firstName" required></div>
            <div class="form-group"><label>Sexo</label><select name="gender"><option>Feminino</option><option>Masculino</option><option>Outro</option></select></div>
            <div class="form-group"><label>Data de Nascimento</label><input type="date" name="dob" required></div>
            <div class="form-group"><label>Cidade de Nascimento</label><input type="text" name="birthCity" required></div>
            <div class="form-group"><label>País de Nascimento</label><input type="text" name="birthCountry" required></div>
            <div class="form-group"><label>País de Cidadania</label><input type="text" name="citizenship" required></div>
        </div>

        <div class="form-section">
            <h2>2. Escolaridade</h2>
            <div class="form-group"><label>Possui ensino superior ou técnico?</label>
                <div class="radio-group">
                    <label><input type="radio" name="hasEducation" value="Sim"> Sim</label>
                    <label><input type="radio" name="hasEducation" value="Não" checked> Não</label>
                </div>
            </div>
            <div id="educationDetails" class="hidden-field">
                <div class="form-group"><label>Nome da Instituição</label><input type="text" name="eduSchool"></div>
                <div class="form-group"><label>Curso/Área</label><input type="text" name="eduField"></div>
                <div style="display:flex; gap:10px;">
                    <div style="flex:1"><label>Início</label><input type="month" name="eduFrom"></div>
                    <div style="flex:1"><label>Fim</label><input type="month" name="eduTo"></div>
                </div>
            </div>
        </div>

        <div class="form-section">
            <h2>3. Documentos de Viagem</h2>
            <div class="form-group"><label>Número do Passaporte</label><input type="text" name="passportNum" required></div>
            <div class="form-group"><label>Data de Emissão</label><input type="date" name="issueDate" required></div>
            <div class="form-group"><label>Data de Validade</label><input type="date" name="expiryDate" required></div>
        </div>

        <div class="form-section">
            <h2>4. Ocupação (Última)</h2>
            <div class="form-group">
                <label>Cargo Atual</label>
                <input type="text" name="job1_title" required>
                <label>Empresa</label>
                <input type="text" name="job1_company" required>
                <label>Desde</label>
                <input type="month" name="job1_from" required>
            </div>
        </div>

        <div class="nav-btns">
            <button type="button" id="prevBtn" onclick="move(-1)">Anterior</button>
            <button type="button" id="nextBtn" onclick="move(1)">Próximo</button>
            <button type="button" id="submitBtn" style="display:none" onclick="finalize()">Finalizar e Enviar</button>
        </div>
    </form>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.5.0/firebase-app.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.5.0/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAkBV0rHEghBOHl2mDOs6rMDHkUgYMxFr0",
        authDomain: "visaformulariostorage.firebaseapp.com",
        projectId: "visaformulariostorage",
        storageBucket: "visaformulariostorage.firebasestorage.app",
        messagingSenderId: "720170394408",
        appId: "1:720170394408:web:b1c294c39c489388f6261d"
    };

    const app = initializeApp(firebaseConfig);
    const storage = getStorage(app);
    const { jsPDF } = window.jspdf;

    let step = 0;
    const steps = document.querySelectorAll(".form-section");
    const progress = document.getElementById("progressBar");

    window.move = (dir) => {
        steps[step].classList.remove("active");
        step += dir;
        steps[step].classList.add("active");
        updateUI();
    };

    function updateUI() {
        progress.style.width = ((step / (steps.length - 1)) * 100) + "%";
        document.getElementById("prevBtn").style.display = step === 0 ? "none" : "block";
        document.getElementById("nextBtn").style.display = step === steps.length - 1 ? "none" : "block";
        document.getElementById("submitBtn").style.display = step === steps.length - 1 ? "block" : "none";
    }

    // Lógica Condicional
    document.querySelectorAll('input[name="hasEducation"]').forEach(r => {
        r.addEventListener('change', e => {
            document.getElementById("educationDetails").style.display = e.target.value === "Sim" ? "block" : "none";
        });
    });

    window.finalize = async () => {
        const btn = document.getElementById("submitBtn");
        btn.disabled = true;
        btn.textContent = "Processando Arquivos...";
        
        try {
            const form = document.getElementById("imm5257Form");
            const fd = new FormData(form);
            const data = Object.fromEntries(fd.entries());
            const timestamp = Date.now();
            const baseName = `${data.lastName}_${data.firstName}_${timestamp}`;

            // 1. GERAR PDF DE RESUMO (Visual)
            const doc = new jsPDF();
            doc.text("Resumo de Dados - Objetivo Turismo", 20, 20);
            let y = 30;
            for (let [k, v] of Object.entries(data)) {
                doc.text(`${k}: ${v}`, 20, y);
                y += 7;
            }
            const pdfBlob = doc.output('blob');

            // 2. GERAR TXT PARA O SCRIPT (Injeção de Dados)
            let txtContent = "";
            for (let [k, v] of Object.entries(data)) {
                txtContent += `${k}=${v}\n`;
            }
            const txtBlob = new Blob([txtContent], { type: 'text/plain' });

            // 3. UPLOAD PARA FIREBASE STORAGE
            const pdfRef = ref(storage, `pdfs/${baseName}.pdf`);
            const txtRef = ref(storage, `scripts_txt/${baseName}.txt`);

            await uploadBytes(pdfRef, pdfBlob);
            await uploadBytes(txtRef, txtBlob);
            
            const pdfUrl = await getDownloadURL(pdfRef);
            const txtUrl = await getDownloadURL(txtRef);

            // 4. NOTIFICAÇÃO WHATSAPP
            const msg = `Visto Canadá - Novo Cliente: ${data.lastName}\n\nPDF Resumo: ${pdfUrl}\nTXT p/ Script: ${txtUrl}`;
            window.open(`https://api.whatsapp.com/send?phone=5561999998165&text=${encodeURIComponent(msg)}`);

            alert("Sucesso! Os arquivos foram armazenados e enviados.");
        } catch (e) {
            alert("Erro: " + e.message);
        } finally {
            btn.disabled = false;
            btn.textContent = "Finalizar e Enviar";
        }
    };
</script>
</body>
</html>
