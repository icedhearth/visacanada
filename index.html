<div class="form-group">
    <label>Possui visto americano (B1/B2) válido ou teve visto canadense nos últimos 10 anos?</label>
    <div class="radio-group">
        <label><input type="radio" name="hasPreviousVisa" value="Sim"> Sim</label>
        <label><input type="radio" name="hasPreviousVisa" value="Não" checked> Não</label>
    </div>
    <div id="previousVisaField" class="hidden-field">
        <label for="previousVisaDetails">Detalhes do Visto (País, Número e Validade)</label>
        <input type="text" id="previousVisaDetails" name="previousVisaDetails">
    </div>
</div>

<div class="form-group">
    <label for="itinerary">Breve Roteiro (Cidades que pretende visitar e atividades)</label>
    <textarea id="itinerary" name="itinerary" placeholder="Ex: 3 dias em Toronto, visita às Cataratas e 2 dias em Montreal."></textarea>
</div>

<div class="form-group">
    <label>Possui bens imóveis ou veículos no Brasil?</label>
    <div class="radio-group">
        <label><input type="radio" name="hasAssets" value="Sim"> Sim</label>
        <label><input type="radio" name="hasAssets" value="Não" checked> Não</label>
    </div>
    <div id="assetsField" class="hidden-field">
        <label for="assetsDetails">Liste os principais bens (Ex: Apartamento em Brasília, Carro 2023)</label>
        <textarea name="assetsDetails" id="assetsDetails"></textarea>
    </div>
</div>

<script>
    // ADICIONE estas linhas na função populatePdf(doc, data) para que apareçam no PDF:
    
    // Abaixo de Passaporte:
    addField("Visto EUA/Canadá Anterior:", `${data.hasPreviousVisa || 'Não'} - ${data.previousVisaDetails || ''}`);
    
    // Abaixo de Contato e Visita:
    addField("Roteiro Previsto:", data.itinerary);
    
    // Abaixo de Educação e Emprego:
    addField("Bens/Vínculos:", `${data.hasAssets || 'Não'} - ${data.assetsDetails || ''}`);

    // ADICIONE estas linhas no setupConditionalLogic ao final do script:
    setupConditionalLogic('hasPreviousVisa', 'previousVisaField');
    setupConditionalLogic('hasAssets', 'assetsField');
</script>
