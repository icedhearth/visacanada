<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMM 5257 Completo | Objetivo Turismo</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 15px; color: #333; }
        .container { max-width: 850px; margin: 20px auto; background-color: #ffffff; padding: 30px; border-radius: 10px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        h1, h2 { text-align: center; color: #1d3557; margin-bottom: 25px; }
        .form-section { display: none; }
        .form-section.active { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .progress-bar { width: 100%; background-color: #e9ecef; border-radius: 5px; margin-bottom: 30px; overflow: hidden; }
        .progress-bar-fill { height: 12px; width: 0%; background-color: #e63946; border-radius: 5px; transition: width 0.4s ease-in-out; }
        .form-group { margin-bottom: 22px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #495057; }
        input[type="text"], input[type="date"], input[type="month"], input[type="email"], input[type="tel"], select, textarea { width: 100%; padding: 12px; border: 1px solid #ced4da; border-radius: 5px; box-sizing: border-box; font-size: 16px; transition: border-color 0.2s; }
        fieldset { border: 1px solid #dee2e6; border-radius: 5px; padding: 20px; margin-bottom: 20px; }
        legend { font-weight: 700; color: #1d3557; padding: 0 10px; }
        .radio-group label { display: inline-block; margin-right: 25px; font-weight: normal; }
        .hidden-field { display: none; margin-top: 15px; border-left: 3px solid #e63946; padding-left: 15px; animation: fadeIn 0.5s; }
        .navigation-buttons { display: flex; justify-content: space-between; margin-top: 30px; }
        button { padding: 12px 28px; border: none; border-radius: 5px; background-color: #e63946; color: white; font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.2s; }
        button#prevBtn { background-color: #6c757d; }
        #statusMessage { text-align: center; margin-top: 20px; font-weight: bold; color: #1d3557; }
    </style>
</head>
<body>

<div class="container">
    <h1>Solicitação de Visto (IMM 5257)</h1>
    <div class="progress-bar"><div class="progress-bar-fill" id="progressBar"></div></div>
    
    <form id="imm5257Form">
        <div class="form-section active">
            <h2>Dados Pessoais</h2>
            <div class="form-group"><label>UCI (Se souber)</label><input type="text" name="uci"></div>
            <div class="form-group"><label>Nome Completo (Conforme Passaporte)</label><input type="text" name="fullName" required></div>
            <div class="form-group"><label>Sexo</label><select name="sex"><option>Feminino</option><option>Masculino</option><option>Outro</option></select></div>
            <div class="form-group"><label>Data de Nascimento</label><input type="date" name="dob" required></div>
            <div class="form-group"><label>Cidade e País de Nascimento</label><input type="text" name="birthPlace" required></div>
            <div class="form-group"><label>Cidadania</label><input type="text" name="citizenship" required></div>
        </div>

        <div class="form-section">
            <h2>Passaporte e Histórico de Vistos</h2>
            <fieldset><legend>Passaporte</legend>
                <div class="form-group"><label>Número</label><input type="text" name="passportNumber" required></div>
                <div class="form-group"><label>Data de Validade</label><input type="date" name="passportExpiryDate" required></div>
            </fieldset>
            <div class="form-group"><label>Possui Visto Americano (B1/B2) válido ou teve visto Canadense nos últimos 10 anos?</label>
                <div class="radio-group">
                    <label><input type="radio" name="hasPrevVisa" value="Sim"> Sim</label>
                    <label><input type="radio" name="hasPrevVisa" value="Não" checked> Não</label>
                </div>
                <div id="prevVisaField" class="hidden-field">
                    <label>Detalhes (País, Número e Validade)</label><input type="text" name="prevVisaDetails">
                </div>
            </div>
        </div>

        <div class="form-section">
            <h2>Histórico Profissional (Últimos 10 anos)</h2>
            <div class="form-group">
                <label>Ocupação Atual</label>
                <input type="text" name="job1" placeholder="Cargo e Empresa" required>
                <input type="month" name="job1_date" style="margin-top:5px" required>
            </div>
            <div class="form-group">
                <label>Ocupação Anterior</label>
                <textarea name="jobHistory" placeholder="Liste cargos, empresas e períodos anteriores para completar 10 anos."></textarea>
            </div>
            <div class="form-group"><label>Possui bens (Imóveis/Veículos) no Brasil?</label>
                <div class="radio-group">
                    <label><input type="radio" name="hasAssets" value="Sim"> Sim</label>
                    <label><input type="radio" name="hasAssets" value="Não" checked> Não</label>
                </div>
                <div id="assetsField" class="hidden-field"><textarea name="assetsDetails" placeholder="Descreva seus bens."></textarea></div>
            </div>
        </div>

        <div class="form-section">
            <h2>Informações de Histórico</h2>
            <div class="form-group"><label>1. Já teve visto negado para qualquer país?</label>
                <select name="bg_denial" class="bg-check"><option value="Não">Não</option><option value="Sim">Sim</option></select>
            </div>
            <div class="form-group"><label>2. Já cometeu ou foi preso por algum crime?</label>
                <select name="bg_crime" class="bg-check"><option value="Não">Não</option><option value="Sim">Sim</option></select>
            </div>
            <div id="bgDetails" class="hidden-field">
                <label>Forneça detalhes obrigatórios:</label><textarea name="bgExplanation"></textarea>
            </div>
        </div>

        <div class="form-section">
            <h2>Declaração</h2>
            <div class="declaration-box">
                <p>Eu autorizo a <strong>Objetivo Turismo</strong> a processar meus dados para fins de assessoria de visto canadense.</p>
            </div>
            <div class="agreement-group"><input type="checkbox" id="agreeTerms"><label for="agreeTerms">Li e concordo.</label></div>
        </div>

        <div class="navigation-buttons">
            <button type="button" id="prevBtn" onclick="navigate(-1)">Anterior</button>
            <button type="button" id="nextBtn" onclick="navigate(1)">Próximo</button>
            <button type="button" id="submitBtn" style="display:none" onclick="generateAndSend()">Enviar para Objetivo Turismo</button>
        </div>
        <div id="statusMessage"></div>
    </form>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.5.0/firebase-app.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.5.0/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAkBV0rHEghBOHl2mDOs6rMDHkUgYMxFr0",
        authDomain: "visaformulariostorage.firebaseapp.com",
        projectId: "visaformulariostorage",
        storageBucket: "visaformulariostorage.firebasestorage.app",
        messagingSenderId: "720170394408",
        appId: "1:720170394408:web:b1c294c39c489388f6261d"
    };

    const app = initializeApp(firebaseConfig);
    const storage = getStorage(app);
    const { jsPDF } = window.jspdf;

    let currentSection = 0;
    const sections = document.querySelectorAll('.form-section');
    const progressBar = document.getElementById('progressBar');

    window.navigate = function(step) {
        sections[currentSection].classList.remove('active');
        currentSection += step;
        sections[currentSection].classList.add('active');
        updateUI();
    };

    function updateUI() {
        progressBar.style.width = (currentSection / (sections.length - 1) * 100) + "%";
        document.getElementById('prevBtn').style.display = currentSection === 0 ? 'none' : 'block';
        document.getElementById('nextBtn').style.display = currentSection === sections.length - 1 ? 'none' : 'block';
        document.getElementById('submitBtn').style.display = currentSection === sections.length - 1 ? 'block' : 'none';
    }

    // Lógica Condicional (Vistos, Bens e Histórico)
    function setupToggle(name, fieldId) {
        document.querySelectorAll(`input[name="${name}"]`).forEach(r => {
            r.addEventListener('change', e => document.getElementById(fieldId).style.display = e.target.value === 'Sim' ? 'block' : 'none');
        });
    }
    setupToggle('hasPrevVisa', 'prevVisaField');
    setupToggle('hasAssets', 'assetsField');
    document.querySelectorAll('.bg-check').forEach(s => s.addEventListener('change', () => {
        const anyYes = Array.from(document.querySelectorAll('.bg-check')).some(sel => sel.value === 'Sim');
        document.getElementById('bgDetails').style.display = anyYes ? 'block' : 'none';
    }));

    window.generateAndSend = async function() {
        const btn = document.getElementById('submitBtn');
        btn.disabled = true; btn.textContent = "Enviando...";
        
        try {
            const data = Object.fromEntries(new FormData(document.getElementById('imm5257Form')).entries());
            const doc = new jsPDF();
            doc.text("Dados IMM 5257 - Objetivo Turismo", 10, 10);
            let y = 20;
            for (let [key, val] of Object.entries(data)) {
                doc.text(`${key}: ${val}`, 10, y); y += 8;
                if (y > 280) { doc.addPage(); y = 10; }
            }

            const pdfBlob = doc.output('blob');
            // ATENÇÃO: Voltamos para a pasta 'pdfs/' que tem permissão no seu Firebase
            const fileName = `pdfs/IMM5257_${data.fullName.replace(/\s+/g, '_')}_${Date.now()}.pdf`;
            const storageRef = ref(storage, fileName);
            
            await uploadBytes(storageRef, pdfBlob);
            const url = await getDownloadURL(storageRef);
            
            const whatsappMsg = `Formulário IMM 5257 concluído para ${data.fullName}. Link: ${url}`;
            window.open(`https://api.whatsapp.com/send?phone=5561999998165&text=${encodeURIComponent(whatsappMsg)}`);
        } catch (error) {
            alert("Erro de Permissão: Verifique se a pasta 'pdfs' existe no seu Firebase Storage.");
            console.error(error);
        } finally {
            btn.disabled = false; btn.textContent = "Enviar para Objetivo Turismo";
        }
    };
</script>

</body>
</html>
